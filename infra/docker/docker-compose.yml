services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cctv
      POSTGRES_PASSWORD: cctv
      POSTGRES_DB: cctv
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "8554:8554"   # RTSP
      - "8888:8888"   # HLS (브라우저 모니터링용)
    environment:
      MTX_PROTOCOLS: tcp

  ingestion:
    build:
      context: ../../services/ingestion
    environment:
      SOURCE_TYPE: file
      SOURCE_PATH: /sample/fall.mp4
      SAMPLE_FPS: "1.0"
      FRAME_STORAGE_PATH: /frames/
      REDIS_URL: redis://redis:6379
    volumes:
      - ./../../data:/data:ro        # 테스트 영상 마운트
      - frames_vol:/frames           # 프레임 저장 (inference와 공유)
    depends_on:
      - redis

  inference:
    build:
      context: ../../services/inference
    environment:
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o
      PROMPT_DIR: /service/prompts
    volumes:
      - frames_vol:/frames:ro        # ingestion이 저장한 프레임 읽기
    depends_on:
      - redis

  backend:
    build:
      context: ../../services/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://cctv:cctv@postgres:5432/cctv
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres

  frontend:
    build:
      context: ../../services/frontend
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws/events
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  redis_data:
  postgres_data:
  frames_vol:

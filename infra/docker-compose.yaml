services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mediamtx:
    image: bluenviron/mediamtx
    ports:
      - "8554:8554"
      - "8888:8888"

  ingestion:
    build:
      context: ../services/ingestion
    environment:
      SOURCE_TYPE: rtsp
      SOURCE_PATH: rtsp://host.docker.internal:8554/cam1
      SAMPLE_FPS: "2"
      REALTIME_SIMULATION: "false"
      CAMERA_ID: ${CAMERA_ID:-cam1}
      FRAME_STORAGE_PATH: /frames/
      REDIS_URL: redis://redis:6379
    volumes:
      - ./../sample:/data:ro
      - frames_vol:/frames
    depends_on:
      - redis
      - inference
    restart: always

  inference:
    build:
      context: ../services/inference
    environment:
      REDIS_URL: redis://redis:6379
      CAMERA_ID: ${CAMERA_ID:-cam1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      PROMPT_DIR: /service/prompts
      FRAME_STORAGE_PATH: /frames
      FRAMES_STREAM: frames
      EVENTS_STREAM: events
      ALERTS_STREAM: alerts
      DEVICE: cpu
    volumes:
      - frames_vol:/frames          # cleaner가 삭제하므로 ro 제거
    depends_on:
      - redis

  # backend:
  #   build:
  #     context: ../services/backend
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     REDIS_URL: redis://redis:6379
  #     EVENTS_STREAM: events
  #     ALERTS_STREAM: alerts
  #   depends_on:
  #     - redis

  frontend:
    build:
      context: ../services/frontend
    ports:
      - "80:80"
    # depends_on:
    #   - backend

volumes:
  redis_data:
  frames_vol: